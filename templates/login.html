{% extends "base.html" %}

{% block title %}Вход | Lowlands VPN{% endblock %}

{% block content %}
<section class="auth-section py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-5">
                <div class="auth-card">
                    <span class="eyebrow">Авторизация</span>
                    <h1 class="h2 mt-3 mb-3">Вход в личный кабинет</h1>
                    <p class="text-secondary mb-4">Позже сюда подключим форму Flask-WTF и проверку пользователя через базу данных.</p>
                    <form>
                        <div class="mb-3">
                            <label class="form-label" for="email">Email</label>
                            <input class="form-control form-control-lg" id="email" type="email" placeholder="name@example.com">
                        </div>
                        <div class="mb-4">
                            <label class="form-label" for="password">Пароль</label>
                            <input class="form-control form-control-lg" id="password" type="password" placeholder="Введите пароль">
                        </div>
                        <button class="btn btn-dark w-100 btn-lg" type="button">Войти</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
